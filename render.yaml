services:
  # Backend API Service (Python Web Service)
  - type: web
    name: codeatlas-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /tmp/data
      - key: OLLAMA_URL
        value: http://localhost:11434  # Update this in Render Dashboard with Cloudflare URL
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  # Frontend Static Site
  - type: static
    name: codeatlas-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codeatlas-backend
          property: host
