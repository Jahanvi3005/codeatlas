services:
  # Backend API Service (Free Tier)
  - type: web
    name: codeatlas-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /data
      - key: OLLAMA_URL # This will be set on Render dashboard to the ngrok URL
        value: http://localhost:11434 
      
  # Frontend Static Site (Free Tier)
  - type: web
    name: codeatlas-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codeatlas-backend
          envVar: RENDER_EXTERNAL_URL
