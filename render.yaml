services:
  # Backend API Service (Python Web Service)
  - type: web
    name: codeatlas-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /tmp/data
      - key: OLLAMA_URL
        value: https://space-member-aqua-regime.trycloudflare.com

  # Frontend Static Site
  - type: web
    name: codeatlas-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://codeatlas-backend-fdzf.onrender.com
        
