services:
  # Backend API Service
  - type: web
    name: codeatlas-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /data
    # Note: On a free tier, /data will be wiped on restart.
    # To persist data, upgrade to a paid tier and attach a disk:
    # disk:
    #   name: codeatlas-data
    #   mountPath: /data
    #   sizeGB: 10
      
  # Frontend Static Site
  - type: web
    name: codeatlas-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codeatlas-backend
          envVar: RENDER_EXTERNAL_URL
        # Append /api by either defining it here or handling in the code
